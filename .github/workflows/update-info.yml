name: Update info.json after release

# Se déclenche dès qu'une release est publiée sur GitHub.
# - Release normale  (prerelease: false) → met à jour info.json sur main
# - Pre-release      (prerelease: true)  → met à jour info.json sur beta
on:
  release:
    types: [published]

jobs:
  update-info:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour pusher le commit

    steps:
      - name: Checkout branche cible
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.prerelease && 'beta' || 'main' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Récupérer l'URL de l'exe depuis les assets de la release
        id: asset
        run: |
          URL=$(echo '${{ toJson(github.event.release.assets) }}' \
            | jq -r '.[] | select(.name == "ZokkymonLauncher.exe") | .browser_download_url')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Télécharger l'exe pour calculer son SHA-256
        run: curl -fsSL -o launcher.exe "${{ steps.asset.outputs.url }}"

      - name: Calculer le SHA-256
        id: sha
        run: |
          SHA=$(sha256sum launcher.exe | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT
          rm launcher.exe

      - name: Mettre à jour info.json
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"   # enlève le 'v' du tag (v0.1.0 → 0.1.0)
          jq \
            --arg v "$VERSION" \
            --arg u "${{ steps.asset.outputs.url }}" \
            --arg s "${{ steps.sha.outputs.sha256 }}" \
            '.version = $v | .url = $u | .sha256 = $s' \
            info.json > info.json.tmp && mv info.json.tmp info.json
          echo "info.json mis à jour :"
          cat info.json

      - name: Commiter et pousser info.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add info.json
          git commit -m "chore: update info.json → ${{ github.event.release.tag_name }}"
          git push
