name: Beta Auto Release

on:
  push:
    branches: [beta]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-beta:
    if: github.actor != 'github-actions[bot]'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build fat JAR
        run: mvn -B -DskipTests clean package

      - name: Install Launch4j
        run: choco install launch4j -y --no-progress

      - name: Setup Java 8 (required by Launch4j)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Build EXE with Launch4j
        shell: pwsh
        run: |
          java -version
          $ws = "${{ github.workspace }}"
          $jarPath = Join-Path $ws "target\ZokkymonLauncher.jar"
          $exePath = Join-Path $ws "ZokkymonLauncher.exe"
          $iconPath = Join-Path $ws "zokkymon.ico"
          $cfgPath = Join-Path $ws "launch4j-ci.xml"

          if (!(Test-Path $jarPath)) { throw "JAR introuvable: $jarPath" }

          $xml = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <launch4jConfig>
            <dontWrapJar>false</dontWrapJar>
            <headerType>gui</headerType>
            <jar>$jarPath</jar>
            <outfile>$exePath</outfile>
            <errTitle>Java requis - ZokkymonLauncher</errTitle>
            <cmdLine></cmdLine>
            <chdir>.</chdir>
            <priority>normal</priority>
            <downloadUrl>https://adoptium.net/temurin/releases/?version=21</downloadUrl>
            <supportUrl>https://adoptium.net/temurin/releases/?version=21</supportUrl>
            <stayAlive>true</stayAlive>
            <restartOnCrash>true</restartOnCrash>
            <manifest></manifest>
            <icon>$iconPath</icon>
            <jre>
              <path>%USERPROFILE%\\.zokkymon\\Jre_21</path>
              <minVersion>21.0.0</minVersion>
              <maxVersion></maxVersion>
            </jre>
          </launch4jConfig>
          "@

          Set-Content -Path $cfgPath -Value $xml -Encoding UTF8

          $launch4jJarCandidates = @(
            "C:\\ProgramData\\chocolatey\\lib\\launch4j\\tools\\launch4j\\launch4j.jar",
            "C:\\Program Files\\Launch4j\\launch4j.jar",
            "C:\\Program Files (x86)\\Launch4j\\launch4j.jar"
          )

          $launch4jJar = $null
          foreach ($candidate in $launch4jJarCandidates) {
            if (Test-Path $candidate) {
              $launch4jJar = $candidate
              break
            }
          }

          if (-not $launch4jJar) {
            throw "launch4j.jar introuvable après installation Chocolatey."
          }

          $launch4jHome = Split-Path -Parent $launch4jJar
          $launch4jCp = "$launch4jJar;$launch4jHome\\lib\\*"

          & java "-cp" $launch4jCp "net.sf.launch4j.Main" $cfgPath
          if ($LASTEXITCODE -ne 0) {
            throw "Échec Launch4j Java CLI (code=$LASTEXITCODE)"
          }

          if (!(Test-Path $exePath)) { throw "EXE non généré: $exePath" }

      - name: Verify EXE output
        shell: pwsh
        run: |
          if (!(Test-Path "ZokkymonLauncher.exe")) {
            throw "EXE absent à la racine du workspace"
          }
          Get-Item "ZokkymonLauncher.exe" | Select-Object FullName, Length, LastWriteTime

      - name: Compute next beta version
        id: version
        shell: pwsh
        run: |
          $info = Get-Content "info.json" -Raw | ConvertFrom-Json
          $parts = $info.version.Split('.')
          if ($parts.Length -lt 3) { throw "Version info.json invalide: $($info.version)" }

          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $currentPatch = [int]$parts[2]

          git fetch --tags --force
          $tags = git tag --list "v$major.$minor.*"

          $maxPatch = -1
          foreach ($tag in $tags) {
            if ($tag -match "^v$major\.$minor\.(\d+)(?:-beta\.\d+)?$") {
              $p = [int]$Matches[1]
              if ($p -gt $maxPatch) { $maxPatch = $p }
            }
          }

          if ($maxPatch -lt 0) {
            $nextPatch = $currentPatch + 1
          } else {
            $nextPatch = $maxPatch + 1
          }

          $version = "$major.$minor.$nextPatch"
          $tag = "v$version"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Prepare release notes
        shell: pwsh
        run: |
          $pendingPath = "release-notes/pending-beta.md"
          $outPath = "release-notes/generated-beta.md"

          $pending = ""
          if (Test-Path $pendingPath) {
            $pending = Get-Content $pendingPath -Raw
          }

          $commits = git log -n 20 --pretty=format:"- %s (%h)"

          if ([string]::IsNullOrWhiteSpace($pending)) {
            $pending = "## Beta automatique`n`nAucune note manuelle fournie pour cette beta."
          }

          $body = @"
          $pending

          ---

          ## Commits inclus
          $commits
          "@

          Set-Content -Path $outPath -Value $body -Encoding UTF8

      - name: Create GitHub prerelease (beta)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Beta ${{ steps.version.outputs.tag }}
          target_commitish: beta
          prerelease: true
          body_path: release-notes/generated-beta.md
          files: ZokkymonLauncher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update info.json (beta)
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/ZokkymonLauncher.exe"
          $sha = (Get-FileHash -Path "ZokkymonLauncher.exe" -Algorithm SHA256).Hash.ToLower()
          $changelog = Get-Content "release-notes/generated-beta.md" -Raw

          $info = Get-Content "info.json" -Raw | ConvertFrom-Json
          $info.version = $version
          $info.url = $url
          $info.sha256 = $sha
          $info.changelog = $changelog.Trim()

          $json = $info | ConvertTo-Json -Depth 20
          [System.IO.File]::WriteAllText((Resolve-Path "info.json"), $json, [System.Text.UTF8Encoding]::new($false))

      - name: Commit and push info.json (beta)
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add info.json
          if (git diff --cached --quiet) {
            Write-Host "Aucun changement info.json à commit."
            exit 0
          }
          git commit -m "chore(beta): update info.json -> ${{ steps.version.outputs.tag }}"
          git push origin beta
